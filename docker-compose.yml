services:
  axe:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - cli
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - AXE_OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ${AXE_CONFIG_PATH:-./axe-config}:/home/axe/.config/axe
      - axe-data:/home/axe/.local/share/axe
    read_only: true
    tmpfs:
      - /tmp/axe:size=10m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      ollama:
        condition: service_started
    networks:
      - axe-net

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - axe-net

volumes:
  axe-data:
  ollama-data:

networks:
  axe-net:
    driver: bridge
